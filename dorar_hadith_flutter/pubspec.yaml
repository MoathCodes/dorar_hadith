name: dorar_hadith_flutter
description: >-
  Flutter integration for dorar_hadith. Wires asset loading and the offline
  rawi.db database for Flutter apps.
version: 0.5.0
homepage: https://github.com/MoathCodes/dorar_hadith
repository: https://github.com/MoathCodes/dorar_hadith
issue_tracker: https://github.com/MoathCodes/dorar_hadith/issues
documentation: https://pub.dev/documentation/dorar_hadith_flutter/latest/

topics:
  - hadith
  - islamic
  - dorar
  - arabic
  - religion

environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dorar_hadith:
    path: ../
  drift: ^2.29.0
  path: ^1.9.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
